<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GYMBOOST - Početna</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    background-color: #111;
}

/* NAVBAR */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 15px;
    background: rgba(0,0,0,0.7);
    z-index: 1001;
}

.navbar button {
    background: none;
    border: none;
    color: white;
    font-size: 18px;
    cursor: pointer;
}

.navbar button:hover {
    color: #00ffcc;
}

/* LOGIN BUTTON */
.top-right-buttons {
    position: fixed;
    top: 10px;
    right: 20px;
    z-index: 1001;
}

.top-right-buttons button {
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: #00ffcc;
    cursor: pointer;
    font-weight: bold;
}

/* SEKCIJE */
section {
    height: 100vh;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    padding: 0 20px;
    position: relative;
    overflow: hidden;
}

/* HOME SECTION */
#home {
    display: flex;
    background-image: url('https://images.unsplash.com/photo-1558611848-73f7eb4001a1?auto=format&fit=crop&w=1950&q=80'); 
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

#home::before {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 0;
}

#home h1, #home button {
    position: relative;
    z-index: 1;
}

#home h1 {
    font-size: 60px;
    margin-bottom: 20px;
}

/* GUMBI */
button.action-btn {
    padding: 15px 40px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    background: #FF8C00;
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button.action-btn:hover {
    background: #FF7000;
    transform: scale(1.05);
}

/* TRAINING SECTION */
#training {
    background: #000;
}

#bg-video {
    position: absolute;
    top: 50%; left: 50%;
    min-width: 100%; min-height: 100%;
    transform: translateX(-50%) translateY(-50%);
    z-index: 0;
    object-fit: cover;
}

.video-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: 1;
}

.training-content {
    position: relative;
    z-index: 2;
}

.training-content h1 {
    font-size: 45px;
    margin-bottom: 40px;
    text-transform: uppercase;
    letter-spacing: 2px;
}

.training-options {
    display: flex;
    gap: 30px;
    justify-content: center;
    flex-wrap: wrap;
}

.training-card {
    background: rgba(51, 51, 51, 0.8);
    padding: 40px 30px;
    border-radius: 15px;
    border: 2px solid #FF8C00;
    cursor: pointer;
    transition: 0.3s;
    font-size: 24px;
    font-weight: bold;
    min-width: 200px;
    backdrop-filter: blur(5px);
}

.training-card:hover {
    background: #FF8C00;
    color: black;
    transform: scale(1.1); 
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.modal-content {
    background: white;
    color: black;
    padding: 30px;
    border-radius: 10px;
    width: 300px;
}

.modal-content h2 { margin-top: 0; text-align: center; }
.modal-content input { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; }
.modal-content button[type="submit"] { width: 100%; padding: 10px; background: #00ffcc; border: none; font-weight: bold; cursor: pointer; margin-top: 15px; }
.close { cursor: pointer; float: right; font-size: 24px; font-weight: bold; }
</style>
</head>
<body>

<div class="navbar">
    <button onclick="showSection('home')">Home</button>
    <a href="onama.html"><button>O nama</button></a>
    <a href="kontakt.html"><button>Kontakt</button></a>
</div>

<div class="top-right-buttons">              
    <button onclick="openModal()">Login</button> 
</div>

<section id="home">
    <h1>GYMBOOST</h1>
    <button class="action-btn" onclick="startTraining()">Start Training</button>
</section>

<section id="training">
    <video autoplay muted loop playsinline id="bg-video">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-man-training-with-a-kettlebell-in-the-gym-14441-large.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>
    
    <div class="training-content">
        <h1>Odaberi svoj plan treninga</h1>
        <div class="training-options">
            <div class="training-card" onclick="window.location.href='cjenik.html'">🏋️‍♂️ Snaga</div>
            <div class="training-card" onclick="window.location.href='cjenik.html'">🏃‍♂️ Kardio</div>
            <div class="training-card" onclick="window.location.href='cjenik.html'">🧘‍♂️ Fleksibilnost</div>
        </div>
    </div>
</section>

<div class="modal" id="loginModal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">×</span>
        <h2>Prijava</h2>
        <form>
            <label>Korisničko ime</label><br>
            <input type="text" required><br><br>
            <label>Lozinka</label><br>
            <input type="password" required><br><br>
            <button type="submit">Prijavi se</button>
        </form>
    </div>
</div>

<script>
function showSection(sectionId) {
    const sections = ['home', 'training'];
    sections.forEach(id => {
        let el = document.getElementById(id);
        if(el) el.style.display = (id === sectionId) ? 'flex' : 'none';
    });
}
showSection('home');
function startTraining() { showSection('training'); }
function openModal() { document.getElementById("loginModal").style.display = "flex"; }
function closeModal() { document.getElementById("loginModal").style.display = "none"; }
window.onclick = function(event) {
    const modal = document.getElementById("loginModal");
    if (event.target === modal) closeModal();
}
</script>

</body>
</html>
